author = "Proof Engineer"          # \author{} on every note — set this to your name for journal-ready output

generator_model = "sonnet"
self_check_model = "sonnet"
taste_model = "sonnet"             # independent fresh-context novelty search referee
referee_model = "sonnet"           # default model for correctness (two passes) AND any [[gates]] below
referee_command = "codex exec"     # not wired in yet; available if sonnet-vs-sonnet independence proves too weak

# --- Custom gates ----------------------------------------------------------
# Pass/fail referee gates, run in listed order between the novelty and
# correctness stages. Each runs one isolated `claude -p` over paper+note and
# must write verdict.json {"verdict": "pass"|"fail", "notes": "...", scores?}.
# To add your own gate: drop prompts/<name>.md (copy the taste.md contract) and
# add a [[gates]] block here. Keys: name (required); prompt (default
# "<name>.md"); on_fail = "archive" (default) | "explore" (loop back to rewrite);
# include_paper (default true); tools (default "Read Write"); model (default
# referee_model); calibration (default false — append taste/{accepted,rejected}
# few-shot examples). Remove the taste block to drop the taste gate entirely.
[[gates]]
name = "taste"
on_fail = "archive"
calibration = true

# Example of a second, user-added gate (uncomment prompts/experiments.md first):
# [[gates]]
# name = "experiments"
# on_fail = "explore"

max_runs_per_day = 5               # intake quota; extra inbox items stay queued for tomorrow
max_usd_per_run = 10.0             # hard cap per claude -p invocation, via --max-budget-usd
                                   # calibrated from a real M1 run: explore cost $5.42, self_check $2.11
max_usd_per_paper = 0           # cumulative cap across all of a run's stages (tracked in state.json).
                                   # Checked BEFORE each stage launches: a run at the cap is parked, not
                                   # archived — raise the cap and re-invoke to resume where it stopped.
max_explore_attempts = 2
max_self_check_attempts = 2
max_referee_attempts = 2           # operational retries per referee stage (invocation errors / malformed verdicts, not rejections)
stage_timeout_seconds = 1800       # wall-clock limit per claude -p invocation
explore_timeout_seconds = 3600     # explore runs experiments AND writes the note — a real run hit the
                                   # 1800s ceiling with nothing captured; give the expensive stage headroom

# Extra flags passed to every `claude -p` invocation.
# --strict-mcp-config keeps your personal MCP servers (and their token cost)
# out of pipeline calls. Add "--bare" for full isolation from your global
# Claude Code config (hooks, CLAUDE.md auto-discovery, plugins) — recommended
# for unattended operation, but note --bare authenticates ONLY via
# ANTHROPIC_API_KEY (subscription OAuth is never read in bare mode).
claude_extra_args = ["--strict-mcp-config"]

notify = true                      # macOS notification when a run lands in review/

lean_enabled = true                # stage 5b: after the correctness gate, submit each theorem-complete-proof
                                   # claim to Aristotle (Harmonic's cloud Lean prover) for formalization.
                                   # Bonus evidence, never a gate — no outcome can archive the run. Free (no
                                   # Anthropic tokens); needs the aristotle CLI (uv tool install aristotlelib)
                                   # + ARISTOTLE_API_KEY, and is skipped without them.
lean_timeout_minutes = 240         # per-claim wall clock from submission; Aristotle proofs can take hours.
                                   # On timeout the task is canceled and the claim marked not-formalizable.
venv_python = ".venv/bin/python3"
